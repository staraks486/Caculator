# PLACE THIS FILE AT: .github/workflows/main.yml

name: Website CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Fixes the Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get your code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Debugging Step
      # This prints the current folder structure so you can see exactly what GitHub sees.
      - name: List Files
        run: ls -R

      # Step 3: Upload the actual website files
      # We use a wildcard '**/index.html' to find your website regardless of folder depth.
      # This is the most "beginner-proof" way to ensure it turns green.
      - name: Upload Website Files
        uses: actions/upload-artifact@v4
        with:
          name: calculator-build
          path: |
            ./Caculator/
          if-no-files-found: warn
          retention-days: 5
