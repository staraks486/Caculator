# PLACE THIS FILE AT: .github/workflows/main.yml

name: Website CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Fixes the Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get your code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Check the "Caculator" folder
      # Since your files are inside a subfolder, we look there.
      - name: Verify files in Caculator folder
        run: |
          if [ -d "Caculator" ]; then
            echo "Found the Caculator folder!"
            ls Caculator
          else
            echo "Error: Caculator folder not found!"
            exit 1
          fi

      # Step 3: Upload the actual website files
      # We set the path to 'Caculator/' so it only uploads your website code.
      - name: Upload Website Files
        uses: actions/upload-artifact@v4
        with:
          name: calculator-build
          path: Caculator/
          if-no-files-found: error
          retention-days: 5
